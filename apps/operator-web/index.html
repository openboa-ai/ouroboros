<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ouroboros operator</title>
  </head>
  <body style="margin: 0; background: #F8F7F5;">
    <div id="root">
      <main
        aria-label="Loading Ouroboros Operator"
        aria-live="polite"
        style="min-height: 100vh; display: grid; place-items: center; box-sizing: border-box; padding: 24px; background: #F8F7F5; color: #17120F; font-family: Inter, ui-sans-serif, system-ui, sans-serif;"
      >
        <section style="width: min(100%, 360px); border-top: 4px solid #F37021; padding-top: 20px;">
          <p style="margin: 0 0 8px; color: #F37021; font-size: 12px; font-weight: 700;">Ouroboros</p>
          <h1 style="margin: 0; font-size: 20px; line-height: 1.3;">Operator is starting</h1>
          <p style="margin: 8px 0 0; color: #57534E; font-size: 14px; line-height: 1.5;">Preparing the operations workspace.</p>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
